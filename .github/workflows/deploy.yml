name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t gcr.io/${{ secrets.FIREBASE_PROJECT_ID }}/merch-backend .
          docker push gcr.io/${{ secrets.FIREBASE_PROJECT_ID }}/merch-backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy merch-backend \
            --image gcr.io/${{ secrets.FIREBASE_PROJECT_ID }}/merch-backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},PAYSTACK_SECRET_KEY=${{ secrets.PAYSTACK_SECRET_KEY }},JWT_SECRET=${{ secrets.JWT_SECRET }}"

